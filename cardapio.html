<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - Raízes do Nordeste</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="menu-container">
        <header>
            <a href="index.html" class="back-link">← Voltar</a>
            <h1>Nosso Cardápio</h1>
        </header>

        <section class="grid-cardapio">
            <!-- Card de Exemplo 1 -->
            <article class="prato-card">
                <div class="prato-img">
                    <!-- Por enquanto, uma cor sólida ou placeholder -->
                    <img src="https://via.placeholder.com/150" alt="Baião de Dois">
                </div>
                <div class="prato-info">
                    <h3>Baião de Dois</h3>
                    <p>Arroz, feijão de corda, queijo coalho e o tempero da casa.</p>
                    <span class="preco">R$ 35,00</span>
                    <button class="btn-add">Adicionar</button>
                </div>
            </article>

            <!-- Card de Exemplo 2 -->
            <article class="prato-card">
                <div class="prato-img">
                    <img src="https://via.placeholder.com/150" alt="Carne de Sol">
                </div>
                <div class="prato-info">
                    <h3>Carne de Sol</h3>
                    <p>Carne de sol artesanal acompanhada de macaxeira frita.</p>
                    <span class="preco">R$ 42,00</span>
                    <button class="btn-add">Adicionar</button>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
