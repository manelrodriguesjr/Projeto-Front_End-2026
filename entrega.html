<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acompanhamento</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .info-box { border: 1px solid #000; padding: 20px; margin: 20px 0; }
        .status-container { margin: 30px 0; }
        .step { display: flex; align-items: center; margin-bottom: 25px; }
        .dot { width: 30px; height: 30px; border: 1px solid #000; border-radius: 50%; background: #ccc; margin-right: 15px; }
        .dot.active { background: #fff; }
        .btn-bottom { width: 100%; padding: 15px; background: #eee; border: 1px solid #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header class="header-navegacao">
        <a href="#" onclick="history.back()">Voltar</a>
        <strong>Raízes do Nordeste</strong>
        <a href="index.html">Início</a>
    </header>

    <div class="container" style="text-align: center;">
        <h2 style="font-family: serif;">Pedido #003</h2>
        <p style="font-weight: bold; margin: 15px 0;">Seu pedido saiu pra entrega!</p>

        <div class="info-box" style="text-align: left;">
            <strong>Endereço de entrega</strong><br>
            Rua: <br><br>
            <strong>Previsão de entrega em 30 minutos</strong>
        </div>

        <div class="status-container" style="text-align: left;">
            <div class="step"><div class="dot"></div><span>Pedido recebido</span></div>
            <div class="step"><div class="dot"></div><span>Em preparo</span></div>
            <div class="step"><div class="dot active"></div><span>Saiu para entrega</span></div>
        </div>

        <button class="btn-full" onclick="window.location.href='concluido.html'" style="background: #000; color: #fff;">
    Confirmar Recebimento
        </button>
    </div>
</body>
</html>
