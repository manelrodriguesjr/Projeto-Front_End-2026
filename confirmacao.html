<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Aprovado - Raízes do Nordeste</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .sucesso-header { text-align: center; padding: 20px 0; }
        .circulo-status { width: 50px; height: 50px; background: #ccc; border-radius: 50%; margin: 0 auto 15px; }
        
        .box-fidelidade { border: 1px solid #000; padding: 20px; text-align: center; margin-bottom: 20px; }
        .pontos-card { border: 1px solid #000; display: inline-block; padding: 15px 30px; margin: 15px 0; background: #fff; box-shadow: 2px 2px 0px #000; }
        
        .detalhes-pagamento { border-top: 2px solid #ccc; padding-top: 15px; margin-bottom: 20px; }
        .linha-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; }
        
        .estrela-clara { color: #ccc; font-size: 20px; vertical-align: middle; }
    </style>
</head>
<body>
    <nav class="header-navegacao">
        <a href="#" onclick="history.back()">Voltar</a>
        <strong>Raízes do Nordeste</strong>
        <a href="index.html">Início</a>
    </nav>

    <div class="container">
        <div class="sucesso-header">
            <div class="circulo-status"></div>
            <h2 style="font-family: serif; font-size: 24px;">Pagamento Aprovado!</h2>
            <p style="font-size: 14px; margin-top: 5px;">Seu pedido foi confirmado com sucesso</p>
        </div>

        <div class="box-fidelidade">
            <h3 style="font-family: serif; font-size: 22px;">
                <span class="estrela-clara">★</span> Parabéns! <span class="estrela-clara">★</span>
            </h3>
            <p style="margin-top: 10px;">Você ganhou <strong>+45 pontos</strong> de fidelidade!</p>
            
            <div class="pontos-card">
                <p style="font-size: 14px; color: #666;">Seus pontos</p>
                <strong style="font-size: 24px;">45 pts</strong>
            </div>
            
            <p style="font-size: 13px; margin-top: 10px;">Continue lanchando, acumule pontos e troque por descontos</p>
        </div>

        <div class="detalhes-pagamento">
            <div class="linha-info">
                <strong>Número do pedido:</strong>
                <span>#003</span>
            </div>
            <div class="linha-info">
                <strong>Valor total:</strong>
                <strong>R$ 45,00</strong>
            </div>
            <div class="linha-info">
                <strong>Status:</strong>
                <span>Pagamento aprovado</span>
            </div>
        </div>

        <button class="btn-full" onclick="irParaAcompanhamento()">Acompanhar Pedido</button>
    </div>

    <script>
        function irParaAcompanhamento() {
            // Aqui podes decidir se vai para entrega ou retirada
            // Por enquanto, vamos simular que vai para a tela de entrega
            window.location.href = 'entrega.html';
        }
    </script>
</body>
</html>
