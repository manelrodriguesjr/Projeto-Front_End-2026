<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisar Pedido - Raízes do Nordeste</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #tela-processamento {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .quadro-processamento {
            border: 1px solid #000;
            padding: 40px 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            background: white;
        }
        .barra-progresso {
            width: 100%;
            height: 15px;
            background: #eee;
            border: 1px solid #999;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        .progresso-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to bottom, #ccc, #999);
            animation: carregar 3s linear forwards;
        }
        @keyframes carregar { from { width: 0%; } to { width: 100%; } }
        .circulo-placeholder { width: 60px; height: 60px; background: #e0e0e0; border-radius: 50%; margin: 0 auto 20px; }
    </style>
</head>
<body style="padding-bottom: 20px;">
    <div id="tela-processamento">
        <div class="quadro-processamento">
            <div class="circulo-placeholder"></div>
            <h2 style="font-family: Georgia, serif; font-size: 1.8rem;">Processando Pagamento</h2>
            <p style="margin: 10px 0;">Aguarde um momento...</p>
            <div class="barra-progresso"><div class="progresso-fill"></div></div>
            <p style="font-size: 0.9rem;">Essa transação é segura</p>
        </div>
    </div>

    <nav class="header-navegacao">
        <a href="javascript:void(0)" onclick="history.back()">Voltar</a>
        <span class="logo-central">Raízes do Nordeste</span>
        <a href="index.html">Início</a>
    </nav>

    <div class="container">
        <h2 style="text-align:center; margin: 15px 0;">Revisar Pedido</h2>

        <section class="checkout-section">
            <h4 class="section-title">Resumo do Pedido</h4>
            <div id="lista-itens"></div>
            <hr class="divider">
            <div class="order-row total">
                <span>TOTAL</span> 
                <span id="valor-total-checkout">R$ 0,00</span>
            </div>
            <div class="pontos-alerta">
                <span style="font-size: 1.2rem;">☆</span> <span id="texto-pontos">Calculando pontos...</span>
            </div>
        </section>

        <section class="checkout-section">
            <h4 class="section-title">Tipo de Recebimento</h4>
            <label class="radio-box">
                <input type="radio" name="recebimento" value="retirada" checked onchange="salvarTipo(this.value)">
                <div class="radio-content"><span>Retirar na Loja</span> <span>Grátis</span></div>
            </label>
            <label class="radio-box">
                <input type="radio" name="recebimento" value="entrega" onchange="salvarTipo(this.value)">
                <div class="radio-content"><span>Entrega</span> <span>R$ 5,00</span></div>
            </label>
        </section>

        <section class="checkout-section">
            <h4 class="section-title">Pagamento</h4>
            <label class="radio-box"><input type="radio" name="p" checked><div class="radio-content"><span>PIX</span></div></label>
            <label class="radio-box"><input type="radio" name="p"><div class="radio-content"><span>Cartão de Crédito/Débito</span></div></label>
        </section>

        <button class="btn-finalizar" onclick="processarPagamento()">
            <span>Finalizar e Pagar</span>
            <span id="botao-total">R$ 0,00</span>
        </button>
    </div>

    <script>
        window.onload = function() {
            const itens = JSON.parse(localStorage.getItem('itensCarrinho'));
            const total = localStorage.getItem('totalPedido');
            const listaDiv = document.getElementById('lista-itens');
            const nomes = {cuscuz: "Cuscuz", bebidas: "Bebidas", tapiocas: "Tapiocas", especial: "Especial - São João"};
            const precos = {cuscuz: 18.5, bebidas: 8.0, tapiocas: 15.0, especial: 25.0};

            localStorage.setItem('tipoRecebimento', 'retirada');

            if (itens) {
                let html = "";
                for (let chave in itens) {
                    if (itens[chave] > 0) {
                        html += `<div class="order-row"><span>${itens[chave]}x - ${nomes[chave]}</span><span>R$ ${(itens[chave]*precos[chave]).toFixed(2).replace('.',',')}</span></div>`;
                    }
                }
                listaDiv.innerHTML = html;
                document.getElementById('valor-total-checkout').innerText = total;
                document.getElementById('botao-total').innerText = total;
                document.getElementById('texto-pontos').innerText = `Você está acumulando +${total.replace('R$ ', '').split(',')[0]} pontos!`;
            }
        };

        function salvarTipo(valor) { localStorage.setItem('tipoRecebimento', valor); }

        function processarPagamento() {
            const usuarioLogado = localStorage.getItem('usuarioLogado');
            if (usuarioLogado === 'true') {
                document.getElementById('tela-processamento').style.display = 'flex';
                setTimeout(() => { window.location.href = 'confirmacao.html'; }, 3000);
            } else {
                alert("Ops! Você precisa estar logado para finalizar o pagamento.");
                localStorage.setItem('origemCheckout', 'true');
                window.location.href = 'cadastro.html';
            }
        }
    </script>
</body>
</html>
